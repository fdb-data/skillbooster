name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Delete existing release (keep tag)
        run: gh release delete ${{ github.ref_name }} --cleanup-tag=false --yes
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish release
        run: npm run package -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
